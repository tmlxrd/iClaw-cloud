name: Deploy app.iclaw.digital

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-app-iclaw-digital
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_NAME: release-${{ github.sha }}
      RELEASE_TARBALL: iclaw-cloud-release.tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package release artifact
        run: |
          tar -czf "$RELEASE_TARBALL" \
            dist \
            public \
            package.json \
            package-lock.json \
            README.md

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release tarball
        run: |
          scp -P "${{ secrets.DEPLOY_SSH_PORT }}" \
            "$RELEASE_TARBALL" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:/tmp/$RELEASE_NAME.tar.gz"

      - name: Install release on server
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "sudo /usr/local/bin/iclaw-cloud-install-release /tmp/$RELEASE_NAME.tar.gz $RELEASE_NAME"

      - name: Verify public health endpoint
        run: |
          for _ in $(seq 1 20); do
            if curl -fsS https://app.iclaw.digital/healthz; then
              exit 0
            fi
            sleep 3
          done
          exit 1
