<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>iClaw share</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/viewer.css" />
</head>
<body>
  <main class="page">
    <header class="page-head">
      <a class="brand" href="/">iClaw cloud</a>
      <span id="meta" class="meta muted"></span>
    </header>

    <section id="gate" class="gate" hidden>
      <h1 class="gate-title">This share is password-protected</h1>
      <p class="muted">Enter the password the sender shared with you out of band.</p>
      <form id="pw-form" class="gate-form">
        <input
          id="pw-input"
          type="password"
          autocomplete="off"
          placeholder="password"
          required
          autofocus
        />
        <button type="submit">Unlock</button>
      </form>
      <p id="gate-error" class="error" hidden></p>
    </section>

    <section id="loading" class="loading">
      <p class="muted">Decrypting…</p>
    </section>

    <section id="error" class="error-page" hidden>
      <h1>Can't open this share</h1>
      <p id="error-detail" class="muted"></p>
    </section>

    <article id="content" class="content" hidden>
      <h1 id="share-title" class="share-title"></h1>
      <p id="share-sub" class="muted share-sub"></p>
      <div id="transcript" class="transcript"></div>
    </article>

    <footer class="page-foot muted">
      End-to-end encrypted. The server never saw the key. ·
      <a href="https://github.com/tmlxrd/iClaw-cloud">source</a>
    </footer>
  </main>

  <script src="/viewer.js" defer></script>
</body>
</html>
