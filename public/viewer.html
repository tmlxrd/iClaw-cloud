<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>iClaw share</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <!-- highlight.js themes — browser picks the matching one via prefers-color-scheme. -->
  <link rel="stylesheet" href="/css/vendor/highlight-github.min.css" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="/css/vendor/highlight-github-dark.min.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="/viewer.css" />
</head>
<body>
  <div class="page">
    <header class="page-head">
      <div class="share-title-bar">
        <h1 id="share-title">Encrypted share</h1>
        <span id="share-meta" class="meta"></span>
      </div>
      <a class="brand" href="{{ICLAW_APP_URL}}" title="iClaw cloud — home">Built by iClaw</a>
    </header>

    <main class="page-main">
      <!-- ── Password gate ─────────────────────────────────────────── -->
      <section id="gate" class="gate" hidden>
        <h2 class="gate-title">This share is password-protected</h2>
        <p class="muted">Enter the password the sender shared with you out of band.</p>
        <form id="pw-form" class="gate-form" autocomplete="off">
          <input
            id="pw-input"
            type="password"
            autocomplete="off"
            placeholder="password"
            required
            autofocus
          />
          <button type="submit">Unlock</button>
        </form>
        <p id="gate-error" class="error" hidden></p>
      </section>

      <!-- ── Decrypt progress (spinner only while crypto runs) ─────── -->
      <section id="loading" class="loading" hidden aria-busy="false">
        <div class="loading-spinner" aria-hidden="true"></div>
      </section>

      <!-- ── Error ─────────────────────────────────────────────────── -->
      <section id="error" class="error-page" hidden>
        <h1>Can't open this share</h1>
        <p id="error-detail" class="muted"></p>
      </section>

      <!-- ── Decrypted chat (mirrors iClaw's .messages > .messages-thread > .msg) -->
      <section id="messages" class="messages" hidden>
        <div id="thread" class="messages-thread" aria-live="polite"></div>
      </section>
    </main>

    <footer class="page-foot">
      End-to-end encrypted. The server never saw the key or the conversation. ·
      <a href="https://github.com/iClawApp/iClaw-cloud">source</a>
    </footer>
  </div>

  <script src="/js/vendor/marked.min.js"></script>
  <script src="/js/vendor/highlight.min.js"></script>
  <script src="/viewer.js" defer></script>
</body>
</html>
